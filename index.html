<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kupa The Game</title>

<style>
@font-face {font-family:"TNR";src:url("times new roman.ttf");}
@font-face {font-family:"TNR-Bold";src:url("times new roman bold.ttf");}

body{
margin:0;
font-family:Arial;
background:url('bg.jpg');
background-size:cover;
}

.container{
max-width:420px;
margin:auto;
padding:10px;
position:relative;
}

.chat{
background:white;
color:black;
padding:15px;
border-radius:20px;
border:2px solid #4da6ff;
min-height:130px;
font-family:"TNR";
}

.name{
font-weight:bold;
margin-bottom:6px;
color:#4da6ff;
}

.characters{
display:flex;
justify-content:center;
gap:20px;
}

.char{
height:28vh;
max-height:220px;
object-fit:contain;
}

button{
width:100%;
margin:8px 0;
padding:12px;
border:none;
border-radius:20px;
background:#ddd;
font-family:"TNR";
}

.music-btn{
position:absolute;
right:10px;
top:180px;
font-size:22px;
background:white;
border-radius:50%;
width:45px;
height:45px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:20px;
width:80%;
max-width:300px;
text-align:center;
z-index:999;
font-family:"TNR";
}
</style>
</head>

<body>

<div class="container">

<div class="chat">
<div class="name">Alysa 💙</div>
<div id="chat"></div>
</div>

<div class="characters">
<img src="MC.png" class="char">
<img src="Cewe 1.png" class="char">
</div>

<div class="music-btn" onclick="toggleMusic()">🎵</div>

<audio id="bgm" src="music.mp3" loop></audio>
<audio id="notif" src="notif.mp3"></audio>

<div id="choices"></div>
<button id="nextBtn" style="display:none;">Lanjutkan</button>

</div>

<script>

let score=100,current=0,sub=0
let waitingReply=false

const chat=document.getElementById("chat")
const choices=document.getElementById("choices")
const nextBtn=document.getElementById("nextBtn")
const notif=document.getElementById("notif")

function playNotif(){
notif.currentTime=0
notif.play()
}

function applyScore(val){
score+=val
if(score>100) score=100
if(score<0) score=0
}

/* 🔥 DRAMA + DAMAGE DINAMIS */
const scenes=[

{
dialog:["Aku tanya jujur ya...","Kamu akhir-akhir ini berubah banget","Sebenernya kamu masih serius sama aku ga?"],
choices:[
{text:"Iya, aku serius kok",val:10,reply:"Aku harap itu bener ya..."},
{text:"Masih jalanin aja sih",val:-5,reply:"Jadi aku cuma opsi buat kamu?"},
{text:"Kenapa sih kamu nanya gitu?",val:-25,reply:"Karena kamu berubah... dan kamu malah defensif"}
]
},

{
dialog:["Kamu kemarin kemana?","Chat aku ga dibales sama sekali"],
choices:[
{text:"Jujur aku lagi sama temen",val:10,reply:"Yaudah… makasih udah jujur"},
{text:"Lagi sibuk aja",val:-5,reply:"Sibuk tapi bisa online ya?"},
{text:"Emang harus laporan?",val:-30,reply:"Oh… jadi aku ga sepenting itu ya"}
]
},

{
dialog:["Kamu masih sayang aku ga sih?"],
choices:[
{text:"Masih banget",val:10,reply:"Aku pengen percaya itu..."},
{text:"Ya masih lah",val:-5,reply:"Jawaban kamu ga meyakinkan..."},
{text:"Ngapain nanya gitu?",val:-35,reply:"Karena aku butuh kepastian... bukan dihindarin"}
]
},

{
dialog:["Kamu ada yang lain ya?","Jujur aja"],
choices:[
{text:"Engga, cuma kamu",val:10,reply:"Aku pegang omongan kamu"},
{text:"Ya ga gitu juga",val:-10,reply:"Jawaban kamu makin bikin curiga"},
{text:"Kamu terlalu overthinking",val:-40,reply:"Kamu ga pernah jawab, selalu nyalahin aku"}
]
},

{
dialog:["Kamu bakal ninggalin aku ga?"],
choices:[
{text:"Engga, aku tetep disini",val:10,reply:"Aku percaya..."},
{text:"Ga tau",val:-10,reply:"Aku takut denger itu"},
{text:"Ya bisa aja",val:-50,reply:"Kamu serius ngomong gitu?"}
]
},

{
dialog:["Terakhir...","Kita lanjut atau selesai?"],
choices:[
{text:"Lanjut",val:10,reply:"Aku harap kali ini beneran..."},
{text:"Liat nanti",val:-10,reply:"Aku ga yakin lagi"},
{text:"Selesai",val:-90,reply:"Yaudah… makasih ya 🙂"}
]
}

]

function load(){
let s=scenes[current]
chat.innerText=s.dialog[sub]
playNotif()

choices.innerHTML=""

if(sub < s.dialog.length-1){
nextBtn.style.display="block"
}else{
nextBtn.style.display="none"

s.choices.sort(()=>Math.random()-0.5).forEach(c=>{
let b=document.createElement("button")
b.innerText=c.text

b.onclick=()=>{
applyScore(c.val)
chat.innerText=c.reply
choices.innerHTML=""
waitingReply=true
nextBtn.style.display="block"
setTimeout(()=>playNotif(),100)
}

choices.appendChild(b)
})
}
}

nextBtn.onclick=()=>{
if(waitingReply){
waitingReply=false
next()
}else{
sub++
load()
}
}

function next(){
current++
sub=0
if(current>=scenes.length) end()
else load()
}

function end(){
let status=""
let msg=""

if(score<=39){
status="PUTUS 💔"
msg="Kupa :<br>Makasih bang udah bikin guwa putus sama dia...😭"
}
else if(score<=79){
status="RAWAN ⚠️"
msg="Kupa :<br>Makasih bang, guwa sama dia gajadi putus karena elu...."
}
else{
status="LANGGENG 😏"
msg="Kupa :<br>Alhamdulillah, aman guwa banggg!!!<br>Makasih banyak buat lu!!!!"
}

document.body.innerHTML=`
<style>
body{
margin:0;
background:url('bg.jpg');
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.wrap{max-width:420px;width:100%;padding:20px;}
.panel{position:relative;}
.panel img{width:100%;}
.scoreLabel{position:absolute;top:65%;left:50%;transform:translateX(-50%);color:red;font-family:"TNR-Bold";}
.scoreVal{position:absolute;top:72%;left:50%;transform:translateX(-50%);color:red;font-family:"TNR-Bold";}
.statusLabel{position:absolute;top:82%;left:50%;transform:translateX(-50%);color:red;font-family:"TNR-Bold";}
.statusVal{position:absolute;top:90%;left:50%;transform:translateX(-50%);color:red;font-family:"TNR-Bold";}
</style>

<div class="wrap">
<div class="panel">
<img src="Last.png">
<div class="scoreLabel">Skor :</div>
<div class="scoreVal">${score}</div>
<div class="statusLabel">Status :</div>
<div class="statusVal">${status}</div>
</div>
</div>

<div class="popup">
<p>${msg}</p>
<button onclick="this.parentElement.remove()">OK</button>
</div>
`
}

function toggleMusic(){
let bgm=document.getElementById("bgm")
if(bgm.paused) bgm.play()
else bgm.pause()
}

load()

</script>

</body>
</html>
